<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" width="1000" height="440" role="img" aria-label="Was greife ich wann? Eine Entscheidungshilfe">
  <rect width="1000" height="440" rx="18" fill="#eef6fc"/>
  <text x="500" y="44" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#2b2a33">What should I reach for?</text>

  <g font-family="-apple-system, sans-serif" font-size="14.5">
    <!-- row 1 -->
    <rect x="60" y="80" width="380" height="62" rx="12" fill="#fff" stroke="#e0935a" stroke-width="2"/>
    <text x="80" y="106" font-weight="700" fill="#2b2a33">Simple reveal, fade, page transition?</text>
    <text x="80" y="128" fill="#7a7782">→ Native CSS: scroll-driven + View Transitions</text>

    <rect x="560" y="80" width="380" height="62" rx="12" fill="#fff" stroke="#4a7fd4" stroke-width="2"/>
    <text x="580" y="106" font-weight="700" fill="#2b2a33">Animating React components / UI state?</text>
    <text x="580" y="128" fill="#7a7782">→ Motion (Framer Motion)</text>

    <!-- row 2 -->
    <rect x="60" y="166" width="380" height="62" rx="12" fill="#fff" stroke="#4a7fd4" stroke-width="2"/>
    <text x="80" y="192" font-weight="700" fill="#2b2a33">Complex timeline, SVG morph, scrollytelling?</text>
    <text x="80" y="214" fill="#7a7782">→ GSAP (+ ScrollTrigger) + Lenis</text>

    <rect x="560" y="166" width="380" height="62" rx="12" fill="#fff" stroke="#3d6fc0" stroke-width="2"/>
    <text x="580" y="192" font-weight="700" fill="#2b2a33">3D scene or WebGL experience?</text>
    <text x="580" y="214" fill="#7a7782">→ Three.js — in React: R3F + Drei</text>

    <!-- row 3 -->
    <rect x="60" y="252" width="380" height="62" rx="12" fill="#fff" stroke="#35a06b" stroke-width="2"/>
    <text x="80" y="278" font-weight="700" fill="#2b2a33">Designer-made vector / micro-animation?</text>
    <text x="80" y="300" fill="#7a7782">→ Lottie (or Spline for 3D)</text>

    <rect x="560" y="252" width="380" height="62" rx="12" fill="#fff" stroke="#7a5cd0" stroke-width="2"/>
    <text x="580" y="278" font-weight="700" fill="#2b2a33">Building the UI itself?</text>
    <text x="580" y="300" fill="#7a7782">→ Tailwind + shadcn/ui</text>
  </g>

  <text x="500" y="372" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="15" font-weight="600" fill="#2b2a33">Rule of thumb for 2026</text>
  <text x="500" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-style="italic" fill="#7a7782">Try native CSS first · reach for a library when the motion gets hard</text>
</svg>
