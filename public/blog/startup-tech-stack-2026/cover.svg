    <path d="M-26 32 C-16 80 16 80 26 32 Z" fill="url(#flame)"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" fill="#2b2a33">
    <text x="110" y="250" font-size="74" font-weight="700" letter-spacing="-3">Which Stack</text>
    <text x="110" y="328" font-size="74" font-weight="700" letter-spacing="-3">for a Startup?</text>
    <text x="114" y="392" font-size="32" font-weight="600" fill="#4a7fd4">React · Angular · Vue · Svelte</text>
    <text x="116" y="438" font-size="24" font-weight="500" fill="#7a7782">Choosing in the AI era — June 2026</text>
