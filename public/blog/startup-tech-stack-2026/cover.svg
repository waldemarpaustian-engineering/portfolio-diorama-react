<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Tech-Stack fürs Startup 2026">
  <defs>
    <linearGradient id="skyS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8d4f5"/>
      <stop offset="0.6" stop-color="#cbe5f7"/>
      <stop offset="1" stop-color="#eef6fc"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="1" stop-color="#ff9d4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#skyS)"/>

  <!-- rocket -->
  <g transform="translate(905 300) rotate(20)">
