<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360" role="img" aria-label="Die drei Grundbausteine: Scene, Camera, Renderer">
  <rect width="1000" height="360" rx="18" fill="#eef6fc"/>
  <text x="500" y="46" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#2b2a33">The three building blocks of every Three.js app</text>

  <!-- Scene -->
  <g transform="translate(70 90)">
    <rect x="0" y="0" width="260" height="200" rx="14" fill="#fff" stroke="#bcd6ee" stroke-width="2"/>
    <text x="130" y="34" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#3d6fc0">Scene</text>
    <text x="130" y="58" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#7a7782">the 3D world / container</text>
    <circle cx="80" cy="120" r="28" fill="#9fd0f5"/>
    <rect x="140" y="100" width="44" height="44" rx="6" fill="#5d9fe4"/>
    <circle cx="200" cy="80" r="12" fill="#ffe9b8"/>
    <text x="130" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#5a6270">meshes · lights · groups</text>
  </g>

  <!-- Camera -->
  <g transform="translate(370 90)">
    <rect x="0" y="0" width="260" height="200" rx="14" fill="#fff" stroke="#bcd6ee" stroke-width="2"/>
    <text x="130" y="34" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#35a06b">Camera</text>
    <text x="130" y="58" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#7a7782">your point of view</text>
    <path d="M70 150 L70 100 L150 80 L150 170 Z" fill="none" stroke="#35a06b" stroke-width="3"/>
    <rect x="150" y="110" width="36" height="30" rx="4" fill="#35a06b"/>
    <text x="130" y="186" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#5a6270">PerspectiveCamera(fov, …)</text>
  </g>

  <!-- Renderer -->
  <g transform="translate(670 90)">
    <rect x="0" y="0" width="260" height="200" rx="14" fill="#fff" stroke="#bcd6ee" stroke-width="2"/>
    <text x="130" y="34" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#e0935a">Renderer</text>
    <text x="130" y="58" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#7a7782">draws scene → &lt;canvas&gt;</text>
    <rect x="60" y="90" width="140" height="80" rx="8" fill="#fdf0e4" stroke="#e0935a" stroke-width="2"/>
    <text x="130" y="136" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#c46a2b">&lt;canvas&gt;</text>
    <text x="130" y="186" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#5a6270">WebGL / WebGPU</text>
  </g>

  <!-- arrows -->
  <g fill="#4a7fd4">
    <path d="M330 190 l24 0 l0 -7 l16 12 l-16 12 l0 -7 l-24 0 z"/>
    <path d="M630 190 l24 0 l0 -7 l16 12 l-16 12 l0 -7 l-24 0 z"/>
  </g>
  <text x="500" y="332" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-style="italic" fill="#7a7782">renderer.render(scene, camera) — call it every frame</text>
</svg>
